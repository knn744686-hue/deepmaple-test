name: DeepMaple Remote Customer Test

on:
  workflow_dispatch:

jobs:
  customer-test:
    runs-on: ubuntu-latest

    steps:
      - name: Test DeepMaple via Ngrok
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          echo "🌐 Testing at: $BASE_URL"
          
          echo "🔍 1. Health Check..."
          curl -f $BASE_URL/health || echo "Health check failed"
          
          echo "📄 2. API Docs Check..."
          curl -f -I $BASE_URL/docs
          
          echo "👤 3. Creating Test Customer..."
          curl -X POST $BASE_URL/api/analyst/customers \
            -H "Content-Type: application/json" \
            -d '{"name":"GitHub Actions Test Customer","email":"test@ngrok.com","company":"Test Inc"}' \
            || echo "Customer creation attempted"
          
          echo ""
          echo "🎉 CUSTOMER TEST TAMAMLANDI!"
          echo "DeepMaple local'de çalışıyor!"
